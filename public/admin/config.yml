backend:
  name: git-gateway
  branch: main

media_folder: public/img
public_folder: /img

site_url: https://azizantravel.netlify.app
logo_url: /img/hero-lombok.jpg

collections:
  - name: packages
    label: Paket Wisata
    label_singular: Paket
    folder: src/content/packages
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{price}}"
    sortable_fields: [order, title]
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, pattern: [ "^[a-z0-9-]+$", "Hanya huruf kecil, angka, dan tanda strip" ] }
      - { label: Kategori, name: category, widget: select, options: [wisata, petualangan, bisnis] }
      - { label: Gambar, name: image, widget: image, default: "/img/paket-wisata.jpg" }
      - { label: Badge, name: badge, widget: string, required: false }
      - { label: Durasi, name: duration, widget: string }
      - { label: Maks Grup, name: maxGroup, widget: number, required: false, value_type: int }
      - { label: Kapasitas, name: capacity, widget: string, required: false }
      - { label: Bagasi, name: luggage, widget: string, required: false }
      - { label: Harga, name: price, widget: string }
      - { label: Harga Per, name: pricePer, widget: string }
      - { label: Termasuk, name: includes, widget: list, field: { label: Item, name: item, widget: string } }
      - { label: Deskripsi, name: description, widget: text }
      - { label: Unggulan, name: featured, widget: boolean, default: false, required: false }
      - { label: Urutan, name: order, widget: number, default: 99, required: false, value_type: int }

  - name: transport
    label: Transportasi / Kendaraan
    label_singular: Kendaraan
    folder: src/content/transportasi
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{price}}"
    sortable_fields: [order, title]
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, pattern: [ "^[a-z0-9-]+$", "Hanya huruf kecil, angka, dan tanda strip" ] }
      - { label: Gambar, name: image, widget: image, default: "/img/transport-bisnis.jpg" }
      - { label: Badge, name: badge, widget: string, required: false }
      - { label: Kategori, name: category, widget: string }
      - { label: Kapasitas, name: capacity, widget: string }
      - { label: Bagasi, name: luggage, widget: string }
      - { label: Harga, name: price, widget: string }
      - { label: Harga Per, name: pricePer, widget: string }
      - { label: Termasuk, name: includes, widget: list, field: { label: Item, name: item, widget: string } }
      - { label: Deskripsi, name: description, widget: text }
      - { label: Urutan, name: order, widget: number, default: 99, required: false, value_type: int }

  - name: blog
    label: Blog / Artikel
    label_singular: Artikel
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: [date, title]
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, pattern: [ "^[a-z0-9-]+$", "Hanya huruf kecil, angka, dan tanda strip" ] }
      - { label: Kategori, name: category, widget: string }
      - { label: Tanggal, name: date, widget: date, format: "YYYY-MM-DD" }
      - { label: Gambar, name: image, widget: image, default: "/img/hero-lombok.jpg" }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string } }
      - { label: Konten, name: body, widget: markdown }

  - name: homepage
    label: Homepage Sections
    label_singular: Section
    folder: src/content/homepage
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{section}}"
    summary: "{{section}}"
    sortable_fields: [section]
    fields:
      - { label: Section ID, name: section, widget: string, pattern: ["^[a-z-]+$", "Hanya huruf kecil dan strip"] }
      - { label: Tag/Label, name: tag, widget: string, required: false }
      - { label: Judul, name: title, widget: string, required: false }
      - { label: Kata Highlight, name: highlightWord, widget: string, required: false }
      - { label: Deskripsi, name: description, widget: text, required: false }
      - { label: Badge Text, name: badge, widget: string, required: false }
      - { label: Badge Icon, name: badgeIcon, widget: string, required: false }
      - { label: Badge Number, name: badgeNumber, widget: string, required: false }
      - { label: Badge Text, name: badgeText, widget: string, required: false }
      - { label: Gambar, name: image, widget: image, required: false }
      - { label: Tombol Utama, name: buttonPrimary, widget: string, required: false }
      - { label: Link Tombol Utama, name: buttonPrimaryLink, widget: string, required: false }
      - { label: Tombol Kedua, name: buttonSecondary, widget: string, required: false }
      - { label: Link Tombol Kedua, name: buttonSecondaryLink, widget: string, required: false }
      - label: Stats
        name: stats
        widget: list
        required: false
        fields:
          - { label: Angka, name: number, widget: string }
          - { label: Label, name: label, widget: string }
      - label: Features
        name: features
        widget: list
        required: false
        fields:
          - { label: Icon, name: icon, widget: string }
          - { label: Judul, name: title, widget: string }
          - { label: Deskripsi, name: description, widget: text }
      - label: Items (Galeri)
        name: items
        widget: list
        required: false
        fields:
          - { label: Gambar, name: image, widget: image }
          - { label: Label, name: label, widget: string }

  - name: testimonials
    label: Testimoni
    label_singular: Testimoni
    folder: src/content/testimonials
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{name}}"
    summary: "{{name}} — {{origin}}"
    sortable_fields: [order, name]
    fields:
      - { label: Nama, name: name, widget: string }
      - { label: Asal, name: origin, widget: string }
      - { label: Testimoni, name: text, widget: text }
      - { label: Rating, name: rating, widget: number, min: 1, max: 5 }
      - { label: Avatar (inisial), name: avatar, widget: string }
      - { label: Urutan, name: order, widget: number, default: 99, required: false, value_type: int }
